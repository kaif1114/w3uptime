name: w3uptime-prod

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - max_worker_processes=24
      - -c
      - timescaledb.max_background_workers=16

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-ingestion:
    image: ${DATA_INGESTION_IMAGE:-w3uptime-data-ingestion:latest}
    container_name: data-ingestion-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      FRONTEND_URL: http://frontend:8000
      HUB_URL: http://hub:8080
    networks:
      - app-network
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4001/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  hub:
    image: ${HUB_IMAGE:-w3uptime-hub:latest}
    container_name: hub-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      DATA_INGESTION_URL: http://data-ingestion:4001
    networks:
      - app-network
    depends_on:
      data-ingestion:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE:-w3uptime-frontend:latest}
    container_name: frontend-prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8000
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      HUB_URL: http://hub:8080
      HUB_SERVER_URL: http://hub:8080
      DATA_INGESTION_URL: http://data-ingestion:4001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - app-network
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  validator:
    image: ${VALIDATOR_IMAGE:-ghcr.io/kaif1114/w3uptime-validator:latest}
    container_name: validator-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      W3UPTIME_PRIVATE_KEY: ${VALIDATOR_PRIVATE_KEY}
      W3UPTIME_WALLET_PASSWORD: ${VALIDATOR_WALLET_PASSWORD}
    volumes:
      - validator_data:/root/.w3uptime
    networks:
      - app-network
    depends_on:
      hub:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network
    depends_on:
      frontend:
        condition: service_healthy
      hub:
        condition: service_healthy

volumes:
  timescaledb_data:
  redis_data:
  validator_data:

networks:
  app-network:
    driver: bridge
