name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & push hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/hub/dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-hub:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-hub:latest
          cache-from: type=gha,scope=hub
          cache-to: type=gha,mode=max,scope=hub

      - name: Build & push data-ingestion
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/data-ingestion/dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-data-ingestion:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/w3uptime-data-ingestion:latest
          cache-from: type=gha,scope=data-ingestion
          cache-to: type=gha,mode=max,scope=data-ingestion

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: SSH → pull images & restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/w3uptime

            echo "==> Logging into GHCR"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            IMG_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            NS="${{ env.IMAGE_NAMESPACE }}"

            echo "==> Pinning compose images to :$IMG_TAG"
            cat > .env.images <<EOF
            FRONTEND_IMAGE=ghcr.io/$NS/w3uptime-frontend:$IMG_TAG
            HUB_IMAGE=ghcr.io/$NS/w3uptime-hub:$IMG_TAG
            DATA_INGESTION_IMAGE=ghcr.io/$NS/w3uptime-data-ingestion:$IMG_TAG
            EOF

            echo "==> git pull (for compose / nginx config updates)"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Pulling new images"
            docker compose --env-file .env --env-file .env.images -f docker-compose.prod.yml pull frontend hub data-ingestion

            echo "==> Restarting services"
            docker compose --env-file .env --env-file .env.images -f docker-compose.prod.yml up -d --remove-orphans

            echo "==> Nginx upstream DNS refresh (recreated containers have new IPs)"
            docker compose -f docker-compose.prod.yml restart nginx

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Service status"
            docker compose -f docker-compose.prod.yml ps
